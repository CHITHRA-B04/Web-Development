<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form align="center">
        <h2><u>Registration Form</u></h2>
        First Name : <input type="text" placeholder="Enter the First Name"><br><br>
        Last Name : <input type="text" placeholder="Enter the Last Name"><br><br>
        Gender : <input type="radio" name="gender">Male <input type="radio" name="gender">Female<br><br>
        Email : <input type="email" placeholder="Enter the Email Id"><br><br>
        Password : <input type="password" placeholder="Enter the Password"><br><br>
        Phone Number : <input type="tel" maxlength="10" placeholder="+91"><br><br>
        Date of Birth : <input type="date"><br><br>
        Scheduled Time : <input type="time"><br><br>
        Course : <select>
            <option>Python</option>
            <option>Java</option>
            <option>Web Development</option>
            <option selected>Full Stack Development</option>
            <option>AI</option>
        </select><br><br>
        Location : <input type="checkbox">Bangalore <input type="checkbox">Chennai <input type="checkbox">Coimbatore<br><br>
        <input type="submit">

    </form>
</body>
</html>

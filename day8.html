<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        footer{
            display: flex;
            line-height: 2;
            background-color: aqua;
            position: fixed;
            bottom: 0px;
            left: 0px;
            width: 100%;
            color: rgb(rgb(218, 197, 197));            
        }
        #mycol2{
            margin-left: 50px;

        }
        li:hover{
            color: black;
            font-weight: 700;
        }
        #header{
            display: flex;
        }
        li{
            margin: 20px;
        }
        select{
            border: none;
        }
    </style>
</head>
<body>
    <nav>
        <ul type="none" id="header">
            <li>About</li>
            <li>Events</li>
            <li>
                <select>
                    <option>Products</option>
                    <option>Watch</option>
                    <option>Phones</option>
                    <option>Laptops</option>
                    <option>Toys</option>
                </select>
            </li>
            <li>Contact</li>
        </ul>
    </nav>
    <!---------------------------------------------------------- How to make footer----------------------------------------------->
    <footer>
        <div id="mycol1">
            <ul type="none">
                <li>Blog</li>
                <li>Resources</li>
                <li>Events</li>
                <li>Contact</li>
            </ul>
        </div> 
        <div id="mycol2">   
            <ul type="none">
                <li>Blog</li>
                <li>Resources</li>
                <li>Events</li>
                <li>Contact</li>
            </ul>
        </div>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            width: 200px;
            height: 200px;
            background-color: black;
            animation-name: anim;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            position: absolute;   /*move the content frome one end to another end*/
        }
        p{
            color: azure;
            font-size: 25px;
            margin-left: 25px;
            font-family: "Playwrite NZ Basic", cursive;
        }
        @keyframes anim{
            10%{background-color: blue; left: 0px;top: 0px;border-radius: 20%; opacity: 0;}
            20%{background-color: aqua;left: 200px; top: 0px; border-radius: 40%;opacity: 0.2;}
            30%{background-color: blueviolet;left: 200px;top: 200px;border-radius: 60%;opacity: 0.4;}
            40%{background-color: chartreuse;left: 0px;top: 200px; border-radius: 80%;opacity: 0.6;}
            50%{background-color: crimson;left: 0px; top: 0px; border-radius: 100%;opacity: 1;}
        }
        /*img{
            animation: anim1 2s infinite;
        }*/
        /*@keyframes anim1{
            10%{transform: translateY(0);opacity: 0;}
            20%{transform: translateY(50%);opacity: 0.5;}
            30%{transform: translateY(100%);opacity: 1;}
            from{transform: scale(1);}  /*zoom in - scale(0) to scale(1)*/
            /*to{transform: scale(0);}    zoom out - scale(1) to scale(0)
        }*/
    </style>
</head>
<body>
    <div id="box">
        <p>Welcome All</p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #maindiv{
            display: flex; /*flex - one dimension attr which is used to align the content in horizontal wise*/
            flex-direction: row; /* dceides which direction we want*/
            
        }
        #maindiv > div{
            padding: 10px;
            margin: 10px;
            border: 1px solid grey;
            border-radius: 20px;
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div id="maindiv">
        <div>Home</div>
        <div>About</div>
        <div>Events</div>
        <div>Products</div>
        <div>Contact</div>
    </div>
</body>
</html>

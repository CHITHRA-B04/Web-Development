<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border-style: solid;
            width: 400px;
            height: 400px;
            border-color: grey;
            border-width: 0.1px;
        }
        h2{
            font-weight: 400;
        }
        #a{
            color: royalblue;
        }
        #b{
            color: red;
        }
        #c{
            color: green;
        }
        #d{
            color: orangered;
        }
        img{
            width: 300px;
            height: 300px;
            padding: 10px;
            margin-left: 30px;
            margin-top: 20px;
            background-color: black;
        }
        p{
            text-align: center;
            color: darkturquoise;
            font-size: 20px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="container">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/watch/c/a/3/-original-imahfwzrfzgkdsgd.jpeg?q=90">
        <p>Titanic Ceramic Green Style Watch </p>
    </div>
    <br>
    <!--------Span Tag - used to add any specific thing to specific words--------->
    <h2>Our Mission is to <span id="a">Organize</span> the world's <span id="b">information</span> and make it <span id="c">universally accessible</span> and <span id="d">useful</span></h2> 
    <!-- <video src="" controls></video> -->
</body>
</html>

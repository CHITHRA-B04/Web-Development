    <style>
        nav{

            margin-left: 20px;
            
        }
        a{
            margin-left: 5px;
            text-decoration: none;
            color: black;
            padding: 10px;
            text-shadow: 1px 1px black;
        }
        table{
            margin-top: 50px;
            box-shadow: 10px 10px 10px black;
        }
        th{
            background-color: chocolate;
        }
        td,th{
            border: 1px solid grey;

            padding: 10px;
            width: 800px;
        }
        img{
            width: 200px;
        }
        #myid{
            width: 400px;
        }
        a:hover{
            background-color: rgb(227, 227, 230);   /*a:hover - which is used to generate a background color when the pointer points across the attribute*/
            padding: 10px;
            border-radius: 20px;
        }
        p{
            text-align: center;
            font-size: 40px;
            font-weight: 500;
            color: transparent;  /* if you want to make the text color ass gradient, then first make the color as transparent*/
            background-image: linear-gradient(180deg,red,green,blue,pink);      /*if i using only this properties then it will display the colors as background color*/
            -webkit-background-clip: text;      /*used to make the background color the text as gradient color*/
            text-shadow: 2px 2px black;
        }
        
    </style>
</head>
